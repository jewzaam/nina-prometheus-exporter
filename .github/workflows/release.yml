# Generated By: Claude Code (Claude Opus 4.7)
# Validates AssemblyInfo version, then:
#   - on push to main: creates tag X.Y.Z.0 if missing (tag push re-fires this workflow)
#   - on tag push X.Y.Z.0: builds Release, zips ship-list, generates manifest.json,
#     attaches both to a GitHub release
# Tag format follows NINA's canonical sample (bare 4-segment). See
# docs/superpowers/specs/2026-05-18-versioning.md.
name: release

on:
  push:
    branches: [main]
    tags:
      - '[0-9]+.[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate version (format + sources match)
        run: make test-version
        shell: bash

  auto-tag:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create version tag if missing
        run: |
          VERSION=$(grep -oE 'AssemblyVersion\("[0-9.]+"\)' Properties/AssemblyInfo.cs | grep -oE '[0-9]+(\.[0-9]+){3}')
          if [ -z "$VERSION" ]; then
            echo "Could not extract AssemblyVersion"
            exit 1
          fi
          TAG="$VERSION"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists, skipping"
          else
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "Created and pushed tag ${TAG}"
          fi

  release:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Install make (chocolatey)
        run: choco install make -y --no-progress
        shell: powershell

      - name: Verify tag matches AssemblyVersion
        shell: pwsh
        run: |
          $match = Select-String -Path Properties/AssemblyInfo.cs -Pattern 'AssemblyVersion\("([0-9.]+)"\)'
          $ver = $match.Matches.Groups[1].Value
          if ($ver -ne "${{ github.ref_name }}") {
            Write-Error "Tag ${{ github.ref_name }} != AssemblyVersion $ver"
            exit 1
          }

      - name: Restore (locked)
        run: make restore RESTORE_FLAGS=--locked-mode

      - name: Build (Release)
        run: make build-release

      - name: Package zip
        run: make build-package

      - name: Build manifest.json
        run: make build-manifest
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            NINA.Plugin.PrometheusExporter.${{ github.ref_name }}.zip
            manifest.json
