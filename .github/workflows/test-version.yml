name: test-version

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-version:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version (format + sources match + bump vs base)
        env:
          BASE_REF: ${{ github.base_ref }}
        run: make test-version
        shell: bash
