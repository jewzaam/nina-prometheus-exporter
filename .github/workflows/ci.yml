# Generated By: Claude Code (Claude Opus 4.7)
# CI pipeline. Jobs:
#   quality - PR + push main: `make check` (build, tests, format, reachability, version-check).
#   release - push main only: tag X.Y.Z.0 from AssemblyVersion, package zip + manifest,
#             validate manifest against upstream schema, create GitHub release.
#             Skips if tag already exists.
# Manifest submission to isbeorn/nina.plugin.manifests is driven locally via
# `make publish-manifest` (avoids needing a broad-scope GitHub token in CI).
# Branch protection: require `quality` as a status check (not `ci`).
# See docs/superpowers/specs/2026-05-18-versioning.md.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Install make (chocolatey)
        run: choco install make -y --no-progress
        shell: powershell

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore (locked)
        run: make restore RESTORE_FLAGS=--locked-mode

      - name: Check (build + tests + format + reachability + version-check)
        env:
          BASE_REF: ${{ github.base_ref }}
        run: make check

  release:
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Install make (chocolatey)
        run: choco install make -y --no-progress
        shell: powershell

      - name: Extract version
        id: ver
        shell: pwsh
        run: |
          $match = Select-String -Path Properties/AssemblyInfo.cs -Pattern 'AssemblyVersion\("([0-9.]+)"\)'
          $ver = $match.Matches.Groups[1].Value
          if ($ver -notmatch '^[0-9]+\.[0-9]+\.[0-9]+\.0$') {
            Write-Error "AssemblyVersion '$ver' does not match X.Y.Z.0"
            exit 1
          }
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Skip if tag already exists
        id: tagcheck
        shell: bash
        run: |
          TAG="${{ steps.ver.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists, skipping release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore (locked)
        if: steps.tagcheck.outputs.skip == 'false'
        run: make restore RESTORE_FLAGS=--locked-mode

      - name: Build (Release)
        if: steps.tagcheck.outputs.skip == 'false'
        run: make build-release

      - name: Package zip
        if: steps.tagcheck.outputs.skip == 'false'
        run: make build-package

      # INSTALLER_URL is plumbed directly because GITHUB_REF_NAME is a read-only
      # runner-set env var: a step `env:` override is silently ignored, so we cannot
      # use the version-from-ver-step that way. INSTALLER_URL has no such restriction.
      - name: Build manifest.json
        if: steps.tagcheck.outputs.skip == 'false'
        run: make build-manifest
        env:
          INSTALLER_URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.version }}/NINA.Plugin.PrometheusExporter.${{ steps.ver.outputs.version }}.zip

      # Validate against the upstream NINA manifest schema before publishing.
      # Catches schema drift (renamed/removed fields, new required fields) at release time
      # rather than at the manifest-PR review stage. Same command works locally.
      - name: Validate manifest against upstream schema
        if: steps.tagcheck.outputs.skip == 'false'
        run: make test-manifest
        shell: bash

      - name: Create and push tag
        if: steps.tagcheck.outputs.skip == 'false'
        shell: bash
        run: |
          TAG="${{ steps.ver.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.tagcheck.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: Release ${{ steps.ver.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            NINA.Plugin.PrometheusExporter.${{ steps.ver.outputs.version }}.zip
            manifest.json
