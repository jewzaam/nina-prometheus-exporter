name: Build

on:
  push:
    branches: [main]
    # Skip CI on doc-only commits — the workflow only builds C#, nothing in these paths affects it.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

# Cancel in-progress runs on the same branch when a new commit lands.
# Per standards/build/github-workflows.md.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          # Cache the NuGet packages dir. Keyed on packages.lock.json — invalidates only when
          # the resolved package set changes.
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Install make (chocolatey)
        run: choco install make -y --no-progress
        shell: powershell

      # Workflow calls Makefile targets, not duplicated dotnet commands
      # (per standards/build/github-workflows.md: keep local and CI in lockstep).
      - name: Restore (locked)
        run: make restore RESTORE_FLAGS=--locked-mode

      - name: Build (Release)
        run: make build-release

      - name: Test
        run: make test-unit

      - name: Format check
        run: make test-format

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Reachability check
        run: make test-reachability

      - name: Upload plugin artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: plugin-dll
          path: bin/Release/*.dll
